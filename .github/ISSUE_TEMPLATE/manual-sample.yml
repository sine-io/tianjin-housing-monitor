name: Manual sample
description: Submit one manual成交样本 for a monitored Tianjin community segment.
title: "[manual-sample] "
body:
  - type: dropdown
    id: community
    attributes:
      label: Community
      description: Pick the monitored community that this sample belongs to.
      options:
        - 鸣泉花园 (mingquan-huayuan)
        - 柏溪花园 (boxi-huayuan)
        - 恋海园 (lianhai-yuan)
        - 万科东第 (wanke-dongdi)
        - 谊景村 (yijing-cun)
    validations:
      required: true
  - type: dropdown
    id: segment
    attributes:
      label: Segment
      description: Pick the monitored segment for this deal sample.
      options:
        - 2居 87-90㎡ (mingquan-2br-87-90)
        - 2居 100-120㎡ (boxi-2br-100-120)
        - 2居 90-110㎡ (lianhai-2br-90-110)
        - 2居 85-90㎡ (wanke-2br-85-90)
        - 2居 75-90㎡ (yijing-2br-75-90)
    validations:
      required: true
  - type: input
    id: sample-date
    attributes:
      label: Sample date
      description: Use the local成交 date in `YYYY-MM-DD` format.
      placeholder: "2026-03-30"
    validations:
      required: true
  - type: input
    id: deal-unit-price
    attributes:
      label: Deal unit price (yuan/sqm)
      description: Enter the成交单价 as a whole number in yuan per square meter.
      placeholder: "19300"
    validations:
      required: true
  - type: input
    id: evidence-url
    attributes:
      label: Evidence URL
      description: Provide the source page or screenshot URL that supports this sample.
      placeholder: "https://example.com/listings/123"
    validations:
      required: true
