name: Manual Input

on:
  issues:
    types:
      - opened
      - edited
      - reopened

concurrency:
  group: repo-main-write-serialization
  cancel-in-progress: false

permissions:
  contents: write
  issues: read

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - name: Trust gate
        run: |
          case "${{ github.event.issue.author_association }}" in
            OWNER|MEMBER|COLLABORATOR)
              ;;
            *)
              echo "Untrusted issue author association: ${{ github.event.issue.author_association }}"
              exit 1
              ;;
          esac

      - name: Reject non-template issues
        run: |
          node <<'EOF'
          const fs = require("node:fs");

          const payload = JSON.parse(fs.readFileSync(process.env.GITHUB_EVENT_PATH, "utf8"));
          const body = payload.issue?.body ?? "";
          const requiredMarkers = [
            "### Community",
            "### Segment",
            "### Sample date",
            "### Deal unit price (yuan/sqm)",
            "### Evidence URL",
          ];

          if (!requiredMarkers.every((marker) => body.includes(marker))) {
            throw new Error("Issue body does not match the manual-sample issue form.");
          }
          EOF

      - name: Check out main
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          npm install -g npm@10.9.4
          npm cache clean --force
          npm ci

      - name: Ingest manual issue
        run: npx tsx scripts/ingest-manual-issue.ts

      - name: Commit manual input artifact
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A "data/manual/incoming/${{ github.event.issue.number }}.json"

          if git diff --cached --quiet; then
            echo "No manual input changes to commit"
            exit 0
          fi

          git commit -m "chore: ingest manual sample from issue #${{ github.event.issue.number }}"
          git push origin HEAD:main
