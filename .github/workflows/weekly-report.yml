name: Weekly Report

on:
  schedule:
    - cron: "0 1 * * 1"

concurrency:
  group: repo-main-write-serialization
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out main
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          npm install -g npm@10.9.4
          npm cache clean --force
          npm install --no-fund --no-audit

      - name: Refresh weekly report outputs
        run: npm run build:data

      - name: Commit refreshed weekly outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A \
            data/series \
            data/reports \
            site/public/data \
            data/manual/incoming \
            data/manual/accepted

          if git diff --cached --quiet; then
            echo "No weekly report changes to commit"
            exit 0
          fi

          git commit -m "chore: refresh weekly report outputs"
          git push origin HEAD:main
