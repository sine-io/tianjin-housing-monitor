name: Collect

on:
  schedule:
    - cron: "17 1,13 * * *"
  workflow_dispatch:

concurrency:
  group: repo-main-write-serialization
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Check out main
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          npm install -g pnpm@9
          pnpm install --no-frozen-lockfile

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Collect upstream snapshots
        run: npm run collect

      - name: Build derived data artifacts
        run: npm run build:data

      - name: Commit refreshed data artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A \
            data/runs \
            data/series \
            data/reports \
            site/public/data \
            data/manual/incoming \
            data/manual/accepted

          if git diff --cached --quiet; then
            echo "No refreshed data artifacts to commit"
            exit 0
          fi

          git commit -m "chore: refresh collected housing data"
          git push origin HEAD:main
